function pocTableCollect(tbodyId, colCount) {
  const tbody = document.getElementById(tbodyId)
  if (!tbody) return []
  return Array.from(tbody.rows).map(row =>
    Array.from(row.cells).slice(0, colCount).map(cell => {
      const sp = cell.querySelector('[data-poc-status]')
      return sp ? sp.dataset.pocStatus || '' : cell.textContent.trim()
    })
  )
}

function pocCollect() {
  const get = id => {
    const el = document.getElementById(id)
    if (!el) return ''
    return (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') ? el.value : el.textContent.trim()
  }
  const phaseSpans = document.querySelectorAll('.poc-phase [data-poc-status]')
  return {
    customer:       get('poc-customer'),
    engagement:     get('poc-engagement'),
    period_start:   get('poc-period-start'),
    period_end:     get('poc-period-end'),
    overview_status: (() => { const el = document.querySelector('#poc-overview-status [data-poc-status]'); return el ? el.dataset.pocStatus || '' : '' })(),
    s1_team:        get('poc-s1-team'),
    cust_team:      get('poc-cust-team'),
    phase_statuses: Array.from(phaseSpans).map(sp => sp.dataset.pocStatus || ''),
    milestones:     pocTableCollect('poc-milestones-body', 5),
    data_sources:   pocTableCollect('poc-sources-body', 7),
    success_criteria: pocTableCollect('poc-criteria-body', 4),
    action_items:   pocTableCollect('poc-actions-body', 4),
    health_notes:   get('poc-health-notes'),
  }
}

function pocApplyData(d) {
  const set = (id, val) => {
    const el = document.getElementById(id)
    if (!el) return
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.value = val || ''
    else el.textContent = val || ''
  }
  set('poc-customer',     d.customer)
  set('poc-engagement',   d.engagement)
  set('poc-period-start', d.period_start)
  set('poc-period-end',   d.period_end)
  // Overview status
  const ovs = document.querySelector('#poc-overview-status [data-poc-status]')
  if (ovs && d.overview_status !== undefined) {
    const s = d.overview_status || ''
    ovs.dataset.pocStatus = s
    ovs.className = `inline-flex px-2 py-0.5 rounded-full text-xs font-medium border cursor-pointer select-none ${POC_STATUS_STYLE[s] || POC_STATUS_STYLE['']}`
    ovs.textContent = s || 'Not Started'
  }
  // Team
  set('poc-s1-team',   d.s1_team)
  set('poc-cust-team', d.cust_team)
  // Phase statuses
  if (d.phase_statuses) {
    const phaseSpans = document.querySelectorAll('.poc-phase [data-poc-status]')
    d.phase_statuses.forEach((s, i) => {
      const sp = phaseSpans[i]
      if (!sp) return
      sp.dataset.pocStatus = s || ''
      sp.className = `inline-flex px-2 py-0.5 rounded-full text-xs font-medium border cursor-pointer select-none ${POC_STATUS_STYLE[s] || POC_STATUS_STYLE['']}`
      sp.textContent = s || 'Not Started'
    })
  }
  // Tables
  const restore = (tbodyId, rows, fn) => {
    const tb = document.getElementById(tbodyId)
    if (tb && rows) tb.innerHTML = rows.map(fn).join('')
  }
  restore('poc-milestones-body', d.milestones,       pocMilestoneRow)
  restore('poc-sources-body',    d.data_sources,     pocSourceRow)
  restore('poc-criteria-body',   d.success_criteria, pocCriteriaRow)
  restore('poc-actions-body',    d.action_items,     pocActionRow)
  // Health notes
  set('poc-health-notes', d.health_notes)
}

async function pocLoadHealth() {
  const el = document.getElementById('poc-health-data')
  if (!el) return
  try {
    const [healthRes, firingRes, sourcesRes] = await Promise.allSettled([
      apiGet('/api/coverage/health'),
      apiGet('/api/coverage/rule-firing-cache'),
      apiGet('/api/ingest/top-sources?days=7'),
    ])
    const h = healthRes.status === 'fulfilled' ? healthRes.value : null
    const f = firingRes.status === 'fulfilled'  ? firingRes.value  : null
    const s = sourcesRes.status === 'fulfilled' ? sourcesRes.value : null

    const score         = h ? Math.round(h.score ?? 0) : '—'
    const parsersLoaded = h ? (h.parsers_loaded ?? '—') : '—'
    const activeSources = h ? (h.active_sources ?? '—') : '—'
    const firedRules    = f?.summary?.fired_in_period ?? '—'
    const totalRules    = f?.summary?.rules_monitored  ?? '—'
    const periodDays    = f?.summary?.period_days ?? 30
    const scoreColor    = typeof score === 'number' ? (score >= 80 ? 'text-emerald-500' : score >= 50 ? 'text-amber-500' : 'text-red-400') : 'text-gray-500'

    const topSources = (s?.data || []).slice(0, 5)
    const maxEvents  = topSources[0]?.events || 1
    const topSrcsHtml = topSources.length ? `
      <div class="mt-5 pt-4 border-t border-gray-100">
        <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Top Data Sources (7d)</div>
        <div class="space-y-2">
          ${topSources.map(src => {
            const name = src['dataSource.name'] || src.name || 'Unknown'
            const pct  = Math.round((src.events / maxEvents) * 100)
            return `<div class="flex items-center gap-3">
              <span class="text-xs text-gray-700 w-48 truncate" title="${esc(name)}">${esc(name)}</span>
              <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                <div class="bg-purple-500 h-1.5 rounded-full" style="width:${pct}%"></div>
              </div>
              <span class="text-xs text-gray-500 tabular-nums w-24 text-right">${(src.events||0).toLocaleString()} events</span>
            </div>`
          }).join('')}
        </div>
      </div>` : ''

    el.innerHTML = `
      <div class="grid grid-cols-4 gap-3">
        ${statCard('Coverage Score', (typeof score === 'number' ? score + '%' : score), scoreColor)}
        ${statCard('Parsers Loaded', parsersLoaded, 'text-gray-900')}
        ${statCard('Active Sources', activeSources, 'text-gray-900')}
        ${statCard('Rules Fired (' + periodDays + 'd)', firedRules + ' / ' + totalRules, 'text-gray-900')}
      </div>
      ${topSrcsHtml}`
  } catch(e) {
    el.innerHTML = `<p class="text-sm text-red-400">${esc(e.message)}</p>`
  }
}

function set(html) { document.getElementById('main').innerHTML = html }

function updateNav(page) {
  document.querySelectorAll('.nav-link').forEach(el => {
    const on = el.dataset.page === page
    el.className = `nav-link flex items-center px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors ${on ? 'bg-purple-600 text-white font-medium' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'}`
  })
}

function route() {
  const h = location.hash || '#/'
  if      (h === '#/coverage')   { updateNav('coverage');   renderCoverage()   }
  else if (h === '#/ingest')     { updateNav('ingest');     renderIngest()     }
  else if (h === '#/quality')    { updateNav('quality');    renderQuality()    }
  else if (h === '#/onboarding') { updateNav('onboarding'); renderOnboarding() }
  else if (h === '#/query')      { updateNav('query');      renderQuery()      }
  else if (h === '#/threat')     { updateNav('threat');     renderThreat()     }
  else if (h === '#/settings')   { updateNav('settings');   renderSettings()   }
  else if (h === '#/poc')        { updateNav('poc');        renderPOC()        }
  else                           { updateNav('home');       renderHome()       }
}

window.addEventListener('hashchange', route)
route()

// Populate sidebar tenant label from active console name (falls back to URL)
;(async () => {
  const el = document.getElementById('sidebar-tenant')
  if (!el) return
  try {
    const data = await apiGet('/api/consoles/active')
    const c = data.console
    if (c && c.name) {
      el.textContent = c.name
      return
    }
    if (c && c.s1_base_url) {
      el.textContent = c.s1_base_url.replace(/^https?:\/\//, '')
      return
    }
  } catch { /* fall through to settings */ }
  try {
    const cfg = await apiGet('/api/settings/config')
    const fields = cfg.fields || cfg
    const url = (fields.find(c => c.key === 'S1_BASE_URL') || {}).value || ''
    el.textContent = url ? url.replace(/^https?:\/\//, '') : 'not configured'
  } catch { /* leave as-is */ }
})()
</script>
