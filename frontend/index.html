const API = 'http://localhost:8001'

// ── Utilities ──────────────────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, opts)
  if (!res.ok) throw new Error(await res.text())
  return res.json()
}
const apiGet  = path => apiFetch(path)
const apiPost = (path, body) => apiFetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
const apiForm = (path, form) => apiFetch(path, { method:'POST', body:form })

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function statCard(label, value, color = 'text-gray-900', sub = '') {
  return `<div class="bg-white border border-gray-200 rounded-xl p-4 text-center shadow-sm">
    <div class="text-2xl font-bold ${color}">${esc(String(value))}</div>
    <div class="text-xs text-gray-500 mt-1">${esc(label)}${sub ? `<span class="ml-1 text-amber-600">(${esc(sub)})</span>` : ''}</div>
  </div>`
}

function errBox(msg) {
  return msg ? `<div class="p-3 bg-red-50 ring-1 ring-red-200 rounded-xl text-sm text-red-700 mb-4">${esc(msg)}</div>` : ''
}

function setBtn(id, loading, label) {
  const b = document.getElementById(id)
  if (!b) return
  b.disabled = loading
  b.textContent = loading ? 'Loading…' : label
}

// ── Sankey diagram (SVG, no external deps) ────────────────────────────────
// flows = [{source, target, value}]
function sankeyChart(flows, W = 1100, H = 560) {
  if (!flows?.length) return '<p class="text-gray-500 text-sm">No data in this period.</p>'

  // Aggregate totals per source / target
  const srcTotals = {}, tgtTotals = {}
  for (const { source, target, value } of flows) {
    srcTotals[source] = (srcTotals[source] || 0) + value
    tgtTotals[target] = (tgtTotals[target] || 0) + value
  }

  // Top 10 sources, top 10 event types
  const sources = Object.entries(srcTotals).sort((a,b) => b[1]-a[1]).slice(0,10).map(([name, val]) => ({ name, val }))
  const targets = Object.entries(tgtTotals).sort((a,b) => b[1]-a[1]).slice(0,10).map(([name, val]) => ({ name, val }))
  const srcSet  = new Set(sources.map(n => n.name))
  const tgtSet  = new Set(targets.map(n => n.name))

  const filtered = flows.filter(f => srcSet.has(f.source) && tgtSet.has(f.target))

  // Layout
  const PAD   = 6          // gap between nodes (px)
  const NW    = 14         // node bar width
  const LX    = 210        // right edge of left (source) nodes
  const RX    = W - 210    // left  edge of right (target) nodes

  const totalSrc = sources.reduce((s, n) => s + n.val, 0)
  const totalTgt = targets.reduce((s, n) => s + n.val, 0)

  // ── Sqrt-scaled node heights so dominant sources don't swamp small ones ──
  // Each node gets: 30% equal share + 70% proportional to sqrt(value)
  function scaleHeights(nodes, total, usable) {
    const sqrtVals = nodes.map(n => Math.sqrt(n.val))
    const sqrtSum  = sqrtVals.reduce((s, v) => s + v, 0)
    const equalH   = usable / nodes.length
    nodes.forEach((n, i) => {
      n.h = Math.max(28, 0.3 * equalH + 0.7 * (sqrtVals[i] / sqrtSum) * usable)
    })
    // Re-normalise so they fit exactly
    const totalH = nodes.reduce((s, n) => s + n.h, 0)
    const scale  = usable / totalH
    nodes.forEach(n => n.h = Math.floor(n.h * scale))
  }

  // Position source nodes (left column)
  const srcUsable = H - PAD * (sources.length - 1)
  scaleHeights(sources, totalSrc, srcUsable)
  let y = 0
  for (const n of sources) { n.y = y; n.x = LX - NW; y += n.h + PAD }

  // Position target nodes (right column)
  const tgtUsable = H - PAD * (targets.length - 1)
  scaleHeights(targets, totalTgt, tgtUsable)
  y = 0
  for (const n of targets) { n.y = y; n.x = RX; y += n.h + PAD }

  const srcIdx = Object.fromEntries(sources.map((n, i) => [n.name, i]))
  const tgtIdx = Object.fromEntries(targets.map((n, i) => [n.name, i]))

  filtered.sort((a, b) => srcIdx[a.source] - srcIdx[b.source] || tgtIdx[a.target] - tgtIdx[b.target])

  const srcOff = sources.map(() => 0)
  const tgtOff = targets.map(() => 0)

  const COLORS = ['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899']

  // Paths
  let paths = ''
  for (const { source, target, value } of filtered) {
    const si = srcIdx[source], ti = tgtIdx[target]
    if (si == null || ti == null) continue
    const sn = sources[si], tn = targets[ti]
    const lh = Math.max(1, (value / totalSrc) * srcUsable)
    const x0 = sn.x + NW, y0 = sn.y + srcOff[si]
    const x1 = tn.x,       y1 = tn.y + tgtOff[ti]
    const mx = (x0 + x1) / 2
    srcOff[si] += lh;  tgtOff[ti] += lh
    const col = COLORS[si % COLORS.length]
    paths += `<path d="M${x0},${y0} C${mx},${y0} ${mx},${y1} ${x1},${y1} L${x1},${y1+lh} C${mx},${y1+lh} ${mx},${y0+lh} ${x0},${y0+lh} Z" fill="${col}" opacity="0.28"/>`
  }

  // Nodes + labels
  const fmt = v => v >= 1e6 ? `${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `${Math.round(v/1e3)}K` : v
  const trunc = (s, n) => s.length > n ? s.slice(0, n) + '…' : s

  let nodes = ''
  sources.forEach((n, i) => {
    const col = COLORS[i % COLORS.length]
    nodes += `<rect x="${n.x}" y="${n.y}" width="${NW}" height="${n.h}" rx="2" fill="${col}"/>`
    nodes += `<text x="${n.x - 6}" y="${n.y + Math.min(n.h/2, n.h - 2)}" text-anchor="end" dominant-baseline="middle" font-size="11" fill="#1f2937" font-family="system-ui,sans-serif">${esc(trunc(n.name, 24))}</text>`
    if (n.h >= 22) nodes += `<text x="${n.x - 6}" y="${n.y + Math.min(n.h/2 + 13, n.h - 2)}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#9ca3af" font-family="system-ui,sans-serif">${fmt(n.val)}</text>`
  })
  targets.forEach(n => {
    const label = n.name || '(unlabelled)'
    nodes += `<rect x="${n.x}" y="${n.y}" width="${NW}" height="${n.h}" rx="2" fill="#94a3b8"/>`
    nodes += `<text x="${n.x + NW + 6}" y="${n.y + Math.min(n.h/2, n.h - 2)}" text-anchor="start" dominant-baseline="middle" font-size="11" fill="#1f2937" font-family="system-ui,sans-serif">${esc(trunc(label, 20))}</text>`
  })

  // Column headers
  const hdrs = `
    <text x="${LX - NW/2}" y="-10" text-anchor="middle" font-size="9" fill="#9ca3af" font-weight="700" letter-spacing="0.08em" font-family="system-ui,sans-serif">SOURCES</text>
    <text x="${RX + NW/2}" y="-10" text-anchor="middle" font-size="9" fill="#9ca3af" font-weight="700" letter-spacing="0.08em" font-family="system-ui,sans-serif">EVENT TYPES</text>`

  return `<svg viewBox="0 -22 ${W} ${H + 26}" class="w-full" style="height:${H + 26}px">${hdrs}${paths}${nodes}</svg>`
}

// ── Simple SVG bar chart ───────────────────────────────────────────────────

function barChart(rows, labelKey, valueKey) {
  if (!rows?.length) return '<p class="text-gray-600 text-sm h-32 flex items-center justify-center">No data</p>'
  const vals = rows.map(r => r[valueKey] || 0)
  const max = Math.max(...vals, 1)
  const W = 680, H = 160, padL = 52, padR = 10, padT = 24, padB = 28
  const chartW = W - padL - padR
  const chartH = H - padT - padB
  const bw = Math.max(8, Math.floor(chartW / rows.length) - 4)

  const defs = `<defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>`

  // Y-axis ticks (4 lines)
  const ticks = [0, 0.25, 0.5, 0.75, 1].map(t => {
    const val = Math.round(max * t)
    const y = padT + chartH - Math.floor(t * chartH)
    const label = val >= 1000 ? (val/1000).toFixed(1)+'k' : val
    return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>
            <text x="${padL - 4}" y="${y + 4}" text-anchor="end" fill="#9ca3af" font-size="9">${label}</text>`
  }).join('')

  const bars = rows.map((r, i) => {
    const val = r[valueKey] || 0
    const bh = Math.max(2, Math.floor((val / max) * chartH))
    const x = padL + i * (chartW / rows.length) + (chartW / rows.length - bw) / 2
    const y = padT + chartH - bh
    // If label looks like a date (YYYY-MM-DD), show MM/DD; otherwise truncate to 10 chars
    const rawLbl = String(r[labelKey] || '')
    const lbl = esc(/^\d{4}-\d{2}-\d{2}$/.test(rawLbl) ? rawLbl.slice(5, 10) : rawLbl.slice(0, 10))
    // value label on top of bar
    const valLbl = val >= 1000 ? (val/1000).toFixed(1)+'k' : val
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="url(#barGrad)" rx="2"/>
            <text x="${x + bw/2}" y="${y - 4}" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="500">${valLbl}</text>
            <text x="${x + bw/2}" y="${H - 6}" text-anchor="middle" fill="#9ca3af" font-size="9">${lbl}</text>`
  }).join('')

  return `<svg viewBox="0 0 ${W} ${H}" class="w-full">${defs}${ticks}${bars}</svg>`
}

function toggleAddConsoleForm() {
  const f = document.getElementById('add-console-form')
  if (f) f.classList.toggle('hidden')
}

async function loadConsolesList() {
  const listEl = document.getElementById('consoles-list')
  if (!listEl) return
  try {
    const data = await apiGet('/api/consoles/list')
    const consoles = data.consoles || []
    if (!consoles.length) {
      listEl.innerHTML = '<div class="text-xs text-gray-500 py-2">No consoles configured — click <strong class="text-gray-700">+ Add</strong> to get started.</div>'
      return
    }
    listEl.innerHTML = consoles.map(c => {
      const dot = c.is_active
        ? '<span class="inline-block w-2 h-2 rounded-full bg-emerald-500 mr-2 shrink-0"></span>'
        : '<span class="inline-block w-2 h-2 rounded-full bg-gray-300 mr-2 shrink-0"></span>'
      const selectBtn = c.is_active
        ? ''
        : `<button onclick="activateConsole(${c.id})" class="px-2 py-0.5 text-xs bg-gray-100 hover:bg-purple-700 rounded text-gray-600 hover:text-white font-medium transition-colors">Select</button>`
      const deleteBtn = c.is_active
        ? `<button disabled class="px-1.5 py-0.5 text-xs rounded text-gray-300 cursor-not-allowed font-bold" title="Cannot delete active console">×</button>`
        : `<button onclick="deleteConsole(${c.id})" class="px-1.5 py-0.5 text-xs bg-red-50 hover:bg-red-100 border border-red-200 rounded text-red-500 hover:text-red-600 font-bold transition-colors" title="Delete console">×</button>`
      return `<div class="flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-gray-50 transition-colors">
        ${dot}
        <span class="text-sm text-gray-900 font-medium min-w-0 truncate">${esc(c.name)}</span>
        <span class="text-xs text-gray-500 min-w-0 truncate flex-1">${esc(c.s1_base_url || '')}</span>
        <div class="flex items-center gap-1 shrink-0">${selectBtn}${deleteBtn}</div>
      </div>`
    }).join('')
  } catch(e) {
    if (listEl) listEl.innerHTML = `<div class="text-xs text-red-400 py-2">Failed to load consoles: ${esc(e.message)}</div>`
  }
}

async function saveConsole() {
  const errEl = document.getElementById('add-console-err')
  if (errEl) errEl.innerHTML = ''
  const body = {
    name: (document.getElementById('ac-name')?.value || '').trim(),
    s1_base_url: (document.getElementById('ac-s1-url')?.value || '').trim(),
    s1_api_token: document.getElementById('ac-token')?.value || '',
    sdl_xdr_url: (document.getElementById('ac-sdl-url')?.value || '').trim(),
    sdl_log_read_key: document.getElementById('ac-log-key')?.value || '',
    sdl_config_read_key: document.getElementById('ac-cfg-key')?.value || '',
    sdl_pq_timeout: parseInt(document.getElementById('ac-pq-timeout')?.value || '600', 10),
  }
  if (!body.name || !body.s1_base_url || !body.s1_api_token || !body.sdl_xdr_url || !body.sdl_log_read_key) {
    if (errEl) errEl.innerHTML = errBox('Name, S1 Console URL, API Token, SDL XDR URL, and Log Read Key are required.')
    return
  }
  try {
    await apiPost('/api/consoles/add', body)
    const f = document.getElementById('add-console-form')
    if (f) f.classList.add('hidden')
    // Clear form
    ;['ac-name','ac-s1-url','ac-token','ac-sdl-url','ac-log-key','ac-cfg-key'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = ''
    })
    const tEl = document.getElementById('ac-pq-timeout'); if (tEl) tEl.value = '600'
    loadConsolesList()
  } catch(e) {
    if (errEl) errEl.innerHTML = errBox(e.message)
  }
}

async function activateConsole(id) {
  try {
    const r = await apiFetch(`/api/consoles/${id}/activate`, { method: 'POST' })
    if (r.needs_sync) {
      // Stale data cleared — show banner then reload
      const banner = document.createElement('div')
      banner.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-amber-50 border border-amber-300 rounded-xl px-5 py-3 text-sm text-amber-800 shadow-lg flex items-center gap-3'
      banner.innerHTML = `<span class="text-lg">🔄</span><span>Switched to <strong>${esc(r.console?.name || 'console')}</strong> — previous sync data cleared. Re-sync sources and parsers.</span>`
      document.body.appendChild(banner)
      setTimeout(() => location.reload(), 2000)
    } else {
      location.reload()
    }
  } catch(e) {
    alert('Failed to activate console: ' + e.message)
  }
}

async function deleteConsole(id) {
  if (!confirm('Delete this console?')) return
  try {
    await apiFetch(`/api/consoles/${id}`, { method: 'DELETE' })
    loadConsolesList()
  } catch(e) {
    alert('Failed to delete console: ' + e.message)
  }
}

const EXCLUDED_SOURCES = new Set([
  'SentinelOne','asset','alert','vulnerability','ActivityFeed',
  'indicator','misconfiguration','SentinelOne Ranger AD'
])

async function homeLoadStats() {
  try {
    const r = await apiGet('/api/coverage/map')
    const sources = (r.sources || []).filter(s => !(EXCLUDED_SOURCES.has(s.source_name) && !s.unlabelled))
    const total = sources.length
    const covered  = sources.filter(s => s.status === 'covered').length
    const stub     = r.summary?.stub_parsers ?? sources.filter(s => s.status === 'stub_parser').length
    const pct = total ? Math.round(covered / total * 100) : 0
    const pctColor = pct >= 80 ? 'text-emerald-400' : pct >= 50 ? 'text-amber-400' : 'text-red-400'

    document.getElementById('home-stats').innerHTML = `
      ${homeStat(pct + '%', 'Parser Coverage', pctColor)}
      ${homeStat(total.toLocaleString(), 'Active Sources', 'text-blue-400')}
      ${homeStat(covered.toLocaleString(), 'Covered', 'text-emerald-400')}
      ${homeStat(stub.toLocaleString(), 'Incomplete Parser', stub > 0 ? 'text-amber-400' : 'text-gray-500', stub > 0 ? 'missing dataSource.name<br>Listed on Parser Quality page' : '')}`

    // Top incomplete parsers by volume
    const incomplete = sources
      .filter(s => s.status === 'stub_parser')
      .sort((a, b) => (b.event_count || 0) - (a.event_count || 0))
      .slice(0, 5)

    if (incomplete.length) {
      const rows = incomplete.map((s, i) => `
        <tr class="${i % 2 === 1 ? 'bg-gray-50' : ''} border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="py-2 pr-4 font-mono text-xs text-gray-900">
            <a href="#/quality" onclick="queueQualitySource('${esc(s.source_name)}')" class="hover:text-purple-400 cursor-pointer transition-colors">${esc(s.source_name)}</a>
          </td>
          <td class="py-2 text-xs text-gray-500">${(s.event_count || 0).toLocaleString()} events</td>
        </tr>`).join('')

      document.getElementById('home-uncovered').classList.remove('hidden')
      document.getElementById('home-uncovered').innerHTML = `
        <div class="bg-white border border-gray-200 rounded-xl p-5 border-t-2 border-t-amber-500">
          <h2 class="text-sm font-semibold text-gray-900 mb-1">Top Incomplete Parsers</h2>
          <p class="text-xs text-gray-500 mb-3">Highest-volume sources with a parser file missing <code class="bg-gray-100 px-1 rounded">dataSource.name</code> — click to inspect in Parser Quality.</p>
          <table class="w-full">
            <thead><tr class="text-left text-gray-500 border-b border-gray-100">
              <th class="pb-2 pr-4 text-xs font-medium">Source</th>
              <th class="pb-2 text-xs font-medium">Volume</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`
    }
  } catch(e) {
    document.getElementById('home-stats').innerHTML = `
      ${homeStat('—', 'Parser Coverage', 'text-gray-600')}
      ${homeStat('—', 'Active Sources', 'text-gray-600')}
      ${homeStat('—', 'Covered', 'text-gray-600')}
      ${homeStat('—', 'Incomplete Parser', 'text-gray-600')}`
  }
}

function homeStat(value, label, valueClass, note) {
  const accent = valueClass.includes('emerald') ? 'border-t-2 border-t-emerald-500'
    : valueClass.includes('red') ? 'border-t-2 border-t-red-500'
    : valueClass.includes('purple') ? 'border-t-2 border-t-purple-500'
    : valueClass.includes('blue') ? 'border-t-2 border-t-blue-500'
    : 'border-t-2 border-t-slate-700'
  return `<div class="bg-white border border-gray-200 rounded-xl p-4 text-center ${accent} shadow-sm">
    <div class="text-2xl font-bold ${valueClass} mb-1">${value}</div>
    <div class="text-xs text-gray-500">${label}</div>
    ${note ? `<div class="text-xs text-gray-400 mt-1">${note}</div>` : ''}
  </div>`
}

function homeCard(href, title, desc, cta, grad) {
  return `<div class="bg-white border border-gray-200 rounded-xl p-6 flex flex-col gap-4 hover:border-gray-300 hover:shadow-md transition-all">
    <div class="w-10 h-10 rounded-lg bg-gradient-to-br ${grad} shadow-lg"></div>
    <div><h2 class="font-semibold text-gray-900">${esc(title)}</h2>
    <p class="text-sm text-gray-500 mt-1 leading-relaxed">${esc(desc)}</p></div>
    <a href="${href}" class="mt-auto text-sm text-purple-600 hover:text-purple-700 font-medium transition-colors">${esc(cta)} →</a>
  </div>`
}

async function loadHealthScore() {
  try {
    const [h, firingData] = await Promise.all([
      apiGet('/api/coverage/health'),
      apiGet('/api/coverage/rule-firing-cache').catch(() => ({ rules: [] })),
    ])

    const score      = h.health_score ?? 0
    const comps      = h.components || {}
    const parserPct  = comps.parser_coverage?.value ?? 0
    const mitrePct   = comps.mitre_coverage?.value  ?? 0
    const firingPct  = comps.rule_firing?.value      // null when cache empty
    const parserW    = comps.parser_coverage?.weight ?? 0.55
    const mitreW     = comps.mitre_coverage?.weight  ?? 0.45
    const firingW    = comps.rule_firing?.weight     ?? 0

    const scoreHex   = score >= 80 ? '#10b981' : score >= 60 ? '#f59e0b' : '#ef4444'

    // ── Concentric donut rings ────────────────────────────────────────────
    const rings = [
      { r: 80, pct: parserPct,       color: '#7c3aed', label: 'Parser Coverage',  weight: parserW },
      { r: 60, pct: mitrePct,        color: '#3b82f6', label: 'MITRE Coverage',   weight: mitreW  },
      { r: 40, pct: firingPct ?? 0,  color: '#10b981', label: 'Rule Firing Rate', weight: firingW },
    ]

    const svgRings = rings.map(ring => {
      const circ  = 2 * Math.PI * ring.r
      const offset = circ * (1 - ring.pct / 100)
      return `<circle cx="100" cy="100" r="${ring.r}" fill="none" stroke="#e5e7eb" stroke-width="15"/>
<circle cx="100" cy="100" r="${ring.r}" fill="none" stroke="${ring.color}" stroke-width="15"
  stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
  stroke-linecap="round" transform="rotate(-90 100 100)"/>`
    }).join('\n')

    const svgEl = `<svg viewBox="0 0 200 200" class="w-full h-full">
      ${svgRings}
      <text x="100" y="94"  text-anchor="middle" font-size="34" font-weight="900" fill="${scoreHex}" font-family="system-ui,sans-serif">${score}</text>
      <text x="100" y="112" text-anchor="middle" font-size="10" fill="#9ca3af"   font-family="system-ui,sans-serif">Health Score</text>
    </svg>`

    // ── Metric breakdown rows ─────────────────────────────────────────────
    const metricRow = ring => {
      const noData  = ring.label === 'Rule Firing Rate' && firingPct === null
      const display = noData ? '—' : `${ring.pct.toFixed(1)}%`
      const valColor = noData ? '#9ca3af' : ring.pct >= 80 ? '#10b981' : ring.pct >= 60 ? '#f59e0b' : '#ef4444'
      const barW    = noData ? 0 : Math.min(100, ring.pct)
      return `<div>
        <div class="flex justify-between items-center mb-1">
          <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${ring.color}"></div>
            <span class="text-sm text-gray-700 font-medium">${ring.label}</span>
          </div>
          <span class="text-sm font-bold" style="color:${valColor}">${display}</span>
        </div>
        <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-1.5 rounded-full" style="width:${barW}%;background:${ring.color}"></div>
        </div>
        <div class="text-xs text-gray-400 mt-0.5">${Math.round(ring.weight * 100)}% health weight</div>
      </div>`
    }

    // ── Top rules (like Top Threat Actors) ───────────────────────────────
    const topRules   = (firingData.rules || []).filter(r => r.alert_count > 0).slice(0, 5)
    const maxAlerts  = topRules[0]?.alert_count || 1
    const ruleColors = ['#ef4444', '#f97316', '#f59e0b', '#8b5cf6', '#3b82f6']

    const topRulesHtml = topRules.length
      ? topRules.map((r, i) => {
          const barPct = Math.round((r.alert_count / maxAlerts) * 100)
          const name   = r.rule_name.length > 38 ? r.rule_name.slice(0, 38) + '…' : r.rule_name
          return `<div class="flex items-center gap-2.5">
            <div class="w-2 h-2 rounded-full shrink-0" style="background:${ruleColors[i]}"></div>
            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-center mb-0.5">
                <span class="text-xs text-gray-700 font-medium truncate" title="${esc(r.rule_name)}">${esc(name)}</span>
                <span class="text-xs font-bold text-gray-900 ml-2 shrink-0">${r.alert_count.toLocaleString()}</span>
              </div>
              <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-1.5 rounded-full" style="width:${barPct}%;background:${ruleColors[i]}"></div>
              </div>
            </div>
          </div>`
        }).join('')
      : `<p class="text-xs text-gray-400 mt-2">No rule firing data yet — sync Detection Library then Rule Firing on the MITRE page.</p>`

    const cardEl = document.getElementById('health-score-card')
    if (cardEl) {
      cardEl.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-gray-100">
          <div class="p-6 flex items-center justify-center">
            <div class="w-44 h-44">${svgEl}</div>
          </div>
          <div class="p-6">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-4">Coverage Breakdown</p>
            <div class="space-y-4">${rings.map(metricRow).join('')}</div>
          </div>
          <div class="p-6">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-4">Top Active Rules</p>
            <div class="space-y-3">${topRulesHtml}</div>
          </div>
        </div>`
    }
  } catch(e) {
    // non-critical — leave skeleton visible
  }
}

async function cvSyncAll() {
  setBtn('btn-sync-all', true, 'Syncing…')
  const errEl = document.getElementById('cv-err')
  if (errEl) errEl.innerHTML = ''
  const results = []
  let hasError = false
  try {
    setBtn('btn-sync-all', true, 'Syncing Parsers…')
    try {
      const res = await apiPost('/api/coverage/load-parsers-from-sdl', {})
      const cf = res.console_fetch || {}
      const dbg = cf.debug || {}
      let parts = []
      if (cf.fetched > 0) parts.push(`fetched ${cf.fetched} from console`)
      else if (cf.skipped) parts.push(`console sync skipped (${cf.skipped})`)
      const parserCount = res.parser_count ?? res.loaded
      parts.push(`${parserCount} parser${parserCount !== 1 ? 's' : ''} loaded`)
      if (cf.failed?.length) parts.push(`${cf.failed.length} console fetch errors`)
      const pathsListed = dbg.paths_listed || []
      const debugHtml = pathsListed.length > 0
        ? `<details class="mt-2"><summary class="text-xs text-gray-500 cursor-pointer hover:text-gray-700">SDL returned ${dbg.paths_found ?? pathsListed.length} paths — click to inspect</summary>
            <div class="mt-1 max-h-48 overflow-y-auto bg-gray-50 rounded-lg p-2 text-xs font-mono text-gray-700 space-y-0.5">${pathsListed.map(p => `<div class="truncate">${esc(p)}</div>`).join('')}</div></details>`
        : (dbg.paths_found === 0 ? `<div class="text-xs text-amber-600 mt-1">⚠ SDL returned 0 paths — check SDL_CONFIG_READ_KEY permissions</div>` : '')
      results.push(`<div class="text-emerald-700"><span class="font-medium">SDL Parsers</span> · ✓ ${parts.join(' · ')}${debugHtml}</div>`)
    } catch(e) { results.push(`<div class="text-red-600"><span class="font-medium">SDL Parsers</span> · ✗ ${esc(e.message)}</div>`); hasError = true }

    setBtn('btn-sync-all', true, 'Syncing Library…')
    try {
      const r = await apiPost('/api/coverage/load-detections', {})
      results.push(`<div class="text-emerald-700"><span class="font-medium">Detection Library</span> · ✓ ${r.loaded} rules synced from ${r.source === 'api' ? 'S1 API' : 'local file'}</div>`)
    } catch(e) { results.push(`<div class="text-red-600"><span class="font-medium">Detection Library</span> · ✗ ${esc(e.message)}</div>`); hasError = true }

    setBtn('btn-sync-all', true, 'Syncing Sources…')
    try {
      const days = document.getElementById('sync-days')?.value || 7
      const r = await apiPost(`/api/coverage/sync-sources?days=${days}`, {})
      results.push(`<div class="text-emerald-700"><span class="font-medium">Live Sources</span> · ✓ ${r.synced} sources synced</div>`)
    } catch(e) { results.push(`<div class="text-red-600"><span class="font-medium">Live Sources</span> · ✗ ${esc(e.message)}</div>`); hasError = true }

    await cvLoad()
  } finally {
    setBtn('btn-sync-all', false, 'Sync All')
    if (errEl && results.length) {
      const cls = hasError ? 'bg-red-50 ring-red-200' : 'bg-emerald-50 ring-emerald-200'
      errEl.innerHTML = `<div class="p-3 ring-1 ${cls} rounded-xl text-sm mb-4 space-y-1">${results.join('')}</div>`
    }
  }
}

async function loadSDLParsers() {
  setBtn('btn-sdl-parsers', true)
  const errEl = document.getElementById('cv-err')
  if (errEl) errEl.innerHTML = ''
  try {
    const res = await apiPost('/api/coverage/load-parsers-from-sdl', {})
    const cf = res.console_fetch || {}
    const dbg = cf.debug || {}
    let parts = []
    if (cf.fetched > 0) {
      parts.push(`fetched ${cf.fetched} from console`)
    } else if (cf.skipped) {
      parts.push(`console sync skipped (${cf.skipped})`)
    }
    const parserCount = res.parser_count ?? res.loaded
    parts.push(`${parserCount} parser${parserCount !== 1 ? 's' : ''} loaded`)
    if (cf.failed?.length) parts.push(`${cf.failed.length} console fetch errors`)
    const msg = `✓ ${parts.join(' · ')}`
    const hasErrors = res.errors?.length || cf.failed?.length

    // Build debug detail block showing what SDL returned
    const pathsListed = dbg.paths_listed || []
    const debugHtml = pathsListed.length > 0 ? `
      <details class="mt-2">
        <summary class="text-xs text-gray-500 cursor-pointer hover:text-gray-700">
          SDL returned ${dbg.paths_found ?? pathsListed.length} path${pathsListed.length !== 1 ? 's' : ''} — click to inspect
        </summary>
        <div class="mt-1 max-h-48 overflow-y-auto bg-gray-100 rounded-lg p-2 text-xs font-mono text-gray-700 space-y-0.5">
          ${pathsListed.map(p => `<div class="truncate">${esc(p)}</div>`).join('')}
        </div>
      </details>` : (dbg.paths_found === 0 ? `<div class="text-xs text-amber-400 mt-1">⚠ SDL returned 0 paths — check SDL_CONFIG_READ_KEY permissions</div>` : '')

    if (hasErrors) {
      const detail = [
        ...(res.errors || []).map(e => `index: ${e.parser}`),
        ...(cf.failed  || []).map(e => `fetch: ${e.path?.split('/').pop()} — ${e.error}`),
      ].join('<br>')
      if (errEl) errEl.innerHTML = `<div class="p-3 bg-red-50 ring-1 ring-red-200 rounded-xl text-sm text-red-700 mb-4">${msg}<br><span class="text-xs opacity-80">${detail}</span>${debugHtml}</div>`
    } else {
      if (errEl) errEl.innerHTML = `<div class="p-3 bg-emerald-50 ring-1 ring-emerald-200 rounded-xl text-sm text-emerald-700 mb-4">${msg}${debugHtml}</div>`
      if (!pathsListed.length) setTimeout(() => { if (errEl) errEl.innerHTML = '' }, 5000)
    }
    cvLoad()
  } catch(e) {
    if (errEl) errEl.innerHTML = errBox(e.message)
  } finally {
    setBtn('btn-sdl-parsers', false, 'Sync SDL Parsers')
  }
}

async function cvSampleUnlabelled() {

  el.innerHTML = '<p class="text-gray-500 text-sm animate-pulse mb-4">Sampling unlabelled events…</p>'
  try {
    const syncDays = +document.getElementById('sync-days')?.value || 1
    const hours = syncDays * 24
    const r = await apiPost('/api/quality/sample-unlabelled', { source: '', limit: 20, hours, filter_mode: 'broad' })
    if (!r.events?.length) {
      el.innerHTML = '<p class="text-gray-500 text-sm mb-4">No unlabelled events found in last 24h.</p>'
      return
    }
    const _rawMsgKeys = ['message', 'unmapped.message', 'unmapped.message_']
    const getRaw = ev => {
      for (const k of _rawMsgKeys) { const v = ev[k]; if (v != null && v !== '' && v !== 'null') return v }
      const rest = Object.fromEntries(Object.entries(ev).filter(([k]) => !_rawMsgKeys.includes(k)))
      return JSON.stringify(rest)
    }
    const rows = r.events.map((ev, i) => {
      const raw = getRaw(ev)
      return `<tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
        <td class="py-2 px-2">
          <div class="flex items-start gap-2">
            <button onclick="navigator.clipboard.writeText(this.dataset.msg)" data-msg="${esc(raw).replace(/"/g,'&quot;')}"
              class="shrink-0 mt-0.5 px-1.5 py-0.5 rounded-md text-gray-400 hover:text-gray-700 hover:bg-gray-100 text-xs transition-colors">⎘</button>
            <span class="font-mono text-xs text-gray-700 break-all">${esc(raw.slice(0,300))}${raw.length>300?'<span class="text-gray-400">…</span>':''}</span>
          </div>
        </td>
      </tr>`
    }).join('')
    // Swap prompt for count once queried
    if (r.total != null) {
      const countEl = document.getElementById('cv-unlabelled-count')
      const promptEl = document.getElementById('cv-unlabelled-prompt')
      if (promptEl) promptEl.classList.add('hidden')
      if (countEl) {
        countEl.classList.remove('hidden')
        countEl.innerHTML =
          `<span class="text-orange-300 font-semibold text-sm">${r.total.toLocaleString()} events with no dataSource.name</span>` +
          `<span class="text-orange-500/70 text-xs ml-2">ingested but unidentified, these need parsers</span>`
      }
    }
    el.innerHTML = `
      <div class="mb-4 rounded-xl ring-1 ring-orange-800/30 overflow-hidden">
        <div class="px-3 py-2 bg-orange-50 border-b border-orange-200 flex items-center justify-between">
          <span class="text-xs text-orange-700 font-medium">Sample of unlabelled events — no dataSource.name set</span>
          <span class="text-xs text-gray-500">${r.count} of ${r.total?.toLocaleString() ?? '?'} returned · last ${syncDays}d${r.columns_seen?.length ? ` · fields: ${r.columns_seen.join(', ')}` : ''}</span>
        </div>
        <div class="max-h-72 overflow-y-auto">
          <table class="text-xs w-full"><tbody>${rows}</tbody></table>
        </div>

function cvSetFilter(f) {
  cvFilter = f
  document.querySelectorAll('[id^="cvf-"]').forEach(b => {
    const on = b.id === `cvf-${f}`
    b.className = `px-3 py-1 text-xs rounded-full border transition-colors ${on ? 'bg-purple-600 border-purple-600 text-white shadow-sm' : 'border-gray-200 text-gray-500 hover:border-gray-300 hover:text-gray-700 cursor-pointer'}`
  })
  if (!cvData?.sources) return

  const LABELS = { covered: 'Covered', parser_needed: 'Incomplete Parser', stub_parser: 'Attributes Missing', unlabelled: 'No dataSource.name' }
  const STYLES  = { covered: 'bg-emerald-50 text-emerald-700 border-emerald-300', parser_needed: 'bg-red-50 text-red-700 border-red-300', stub_parser: 'bg-amber-50 text-amber-700 border-amber-300', unlabelled: 'bg-orange-50 text-orange-700 border-orange-300' }

  const sources = cvData.sources.filter(s => {
    if ((EXCLUDED_SOURCES.has(s.source_name) && !s.unlabelled)) return false
    if (f === 'all')           return true
    if (f === 'parser_needed') return s.status === 'parser_needed'
    if (f === 'stub_parser')   return s.status === 'stub_parser'
    if (f === 'unlabelled')    return s.unlabelled === true
    if (f === 'covered')       return s.status === 'covered'
    return true
  })

  function missingFieldsCell(s) {
    if (!s.missing_fields?.length) {
      return s.rule_count
        ? `<span class="text-emerald-600 text-xs">✓ All fields covered</span>`
        : `<span class="text-gray-700 text-xs">—</span>`
    }
    const id = 'mf-' + s.source_name.replace(/[^a-z0-9]/gi, '_')
    const chips = s.missing_fields.map(f =>
      `<span class="px-1.5 py-0.5 bg-red-50 border border-red-200 rounded text-xs font-mono text-red-600">${esc(f)}</span>`
    ).join(' ')
    return `<div>
      <button onclick="cvToggleMissing('${id}')"
        class="flex items-center gap-1.5 text-xs text-red-400 hover:text-red-300 transition-colors">
        <span class="px-1.5 py-0.5 bg-red-50 border border-red-300 rounded font-semibold">${s.missing_fields.length}</span>
        <span>field${s.missing_fields.length !== 1 ? 's' : ''} missing</span>
        <span id="${id}-chevron" class="text-gray-600">▶</span>
      </button>
      <div id="${id}" class="hidden mt-1.5 flex flex-wrap gap-1">${chips}</div>
    </div>`
  }

  function detectionsCell(s) {
    const firingPopulated = cvData?.summary?.firing_cache_populated === true

    if (s.rule_count) {
      const rules = s.rules || []
      const uid = 'det-' + s.source_name.replace(/[^a-z0-9]/gi, '_')

      // Build summary line: "12 rules" with silent warning if any never fired
      const silentCount = firingPopulated ? rules.filter(r => (r.alert_count || 0) === 0).length : 0
      const silentBadge = (firingPopulated && silentCount > 0)
        ? ` <span class="text-amber-500 text-xs">⚠ ${silentCount} silent</span>`
        : ''
      const summary = `<span class="text-purple-400 font-medium">${s.rule_count}</span> rule${s.rule_count !== 1 ? 's' : ''}${silentBadge}`

      if (!rules.length) {
        // No rule detail from backend — just show count, no toggle
        return summary
      }

      // Group rules by product
      const byProduct = {}
      for (const r of rules) {
        const prod = r.product || 'SentinelOne'
        if (!byProduct[prod]) byProduct[prod] = []
        byProduct[prod].push(r)
      }

      // Build expanded rule list: one rule per line, grouped by product
      let listHtml = ''
      for (const [product, prodRules] of Object.entries(byProduct)) {
        listHtml += `<div class="mt-1.5 mb-0.5 text-xs font-semibold text-gray-500 uppercase tracking-wide">${esc(product)}</div>`
        for (const r of prodRules) {
          const alerts = r.alert_count ?? null
          if (!firingPopulated || alerts === null) {
            listHtml += `<div class="text-gray-700 font-mono text-xs py-0.5 leading-tight" title="${esc(r.rule)}">${esc(r.rule)}</div>`
          } else if (alerts > 0) {
            listHtml += `<div class="text-purple-600 font-mono text-xs py-0.5 leading-tight" title="${esc(r.rule)} — ${alerts} alerts">${esc(r.rule)} <span class="text-emerald-500">(${alerts})</span></div>`
          } else {
            listHtml += `<div class="text-amber-400 font-mono text-xs py-0.5 leading-tight" title="${esc(r.rule)} — never fired">⚠ ${esc(r.rule)}</div>`
          }
        }
      }

      return `<div>
        <button onclick="toggleDetections('${uid}')" class="flex items-center gap-1.5 hover:opacity-80 transition-opacity text-left">
          ${summary}
          <svg id="${uid}-chev" class="w-3 h-3 text-gray-500 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="${uid}" class="hidden mt-1 pl-1 border-l border-gray-200">${listHtml}</div>
      </div>`
    }

    if (s.close_matches && s.close_matches.length) {
      const hints = s.close_matches.map(m =>
        `<span class="text-amber-400">${esc(m.library_name)}</span> <span class="text-gray-600">(${m.rule_count} rules)</span>`
      ).join(', ')
      return `<span class="text-gray-400">—</span> <span class="text-amber-600 text-xs" title="dataSource.name mismatch?">⚠ similar: ${hints}</span>`
    }
    return `<span class="text-gray-400">—</span>`
  }


  function parserCell(s) {
    if (s.status === 'covered') {
      return `<span class="text-emerald-400 font-medium">✓ Parsed</span>`
    }
    if (s.status === 'stub_parser') {
      const fix = s.stub_suggested_ds_name
        ? `<span class="ml-2 font-mono text-xs text-gray-500 select-all" title="Add this to your parser's attributes block">"dataSource.name": "${esc(s.stub_suggested_ds_name)}"</span>`
        : ''
      return `<span class="text-amber-400 font-medium" title="Parser file exists but is missing dataSource.name — add the attribute shown to wire it up">⚠ ${esc(s.parser)} — no dataSource.name</span>${fix}`
    }
    if (s.unlabelled) {
      return `<span class="text-orange-400 font-medium" title="These events arrived with no dataSource.name — the parser sending them is missing the dataSource.name attribute">⚠ Events have no dataSource.name</span>`
    }
    return `<span class="text-red-400 font-medium">✗ Not Parsed</span>`
  }

  document.getElementById('cv-table').innerHTML = sources.length === 0
    ? '<p class="text-gray-400 text-sm">No sources match this filter.</p>'
    : `<div class="overflow-x-auto rounded-xl border border-gray-200"><table class="w-full text-sm">
        <thead><tr class="text-left text-gray-500 bg-gray-50 border-b border-gray-200">
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Data Source</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Events (7d)</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Status</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Parser</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Detections</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Fields Missing</th>
        </tr></thead>
        <tbody>${sources.map((s, idx) => `
          <tr class="${idx % 2 === 1 ? 'bg-gray-50/50' : 'bg-transparent'} border-b border-gray-100 hover:bg-gray-50 transition-colors">
            <td class="py-2.5 px-4 font-mono text-xs">
              <a href="#/quality" onclick="queueQualitySource('${esc(s.source_name)}')"
                class="text-gray-900 hover:text-purple-600 cursor-pointer transition-colors"
                title="Open in Parser Quality">${esc(s.source_name)}</a>
            </td>
            <td class="py-2.5 px-4 text-xs text-gray-500">${(s.event_count||0).toLocaleString()}</td>
            <td class="py-2.5 px-4"><span class="px-2.5 py-1 rounded-full text-xs font-medium border ${STYLES[s.status]||''}">${LABELS[s.status]||s.status}</span></td>
            <td class="py-2.5 px-4 text-xs">${parserCell(s)}</td>
            <td class="py-2.5 px-4 text-xs text-gray-500">${detectionsCell(s)}</td>
            <td class="py-2.5 px-4 text-xs">${missingFieldsCell(s)}</td>
          </tr>`).join('')}
        </tbody></table></div>`
}

async function igLoad() {
  const spinner = `<p class="text-gray-500 text-sm animate-pulse">Querying data lake…</p>`
  document.getElementById('ig-chart').innerHTML = spinner
  document.getElementById('ig-sources').innerHTML = spinner

  const sourcesUrl   = igHours ? `/api/ingest/top-sources?hours=${igHours}` : `/api/ingest/top-sources?days=${igDays}`
  const sankeyUrl    = igHours ? `/api/ingest/by-event-type?hours=${igHours}` : `/api/ingest/by-event-type?days=${igDays}`

  const [sankeyResult, sourcesResult] = await Promise.allSettled([
    apiGet(sankeyUrl),
    apiGet(sourcesUrl),
  ])

  // Update chart title
  const titleEl = document.getElementById('ig-chart-title')
  const subEl   = document.getElementById('ig-chart-sub')
  if (titleEl) titleEl.textContent = 'Source → Event Type'
  if (subEl)   subEl.textContent   = igHours ? `flow · last ${igHours}h` : `flow · last ${igDays}d`

let _obPipelineData = null

async function loadOnboardingPipeline() {
  const statsEl = document.getElementById('ob-pipeline-stats')
  const tableEl = document.getElementById('ob-pipeline-table')
  if (!statsEl || !tableEl) return
  try {
    const data = await apiGet('/api/coverage/onboarding-status')
    _obPipelineData = data
    const sources = data.sources || []

    // Split into two groups first so we can compute per-pipeline stats
    const withRules    = sources.filter(s => s.has_detection_rules)
    const withoutRules = sources.filter(s => !s.has_detection_rules)

    const fullDone    = withRules.filter(s => s.completed === s.total).length
    const fullProg    = withRules.filter(s => s.completed > 0 && s.completed < s.total).length
    const partialDone = withoutRules.filter(s => s.completed === s.total).length
    const partialProg = withoutRules.filter(s => s.completed > 0 && s.completed < s.total).length

    statsEl.innerHTML = `
      <div class="flex items-center gap-2">
        <span class="px-3 py-1.5 rounded-full bg-purple-100 border border-purple-200 text-xs text-purple-700">Full Pipeline: ${withRules.length} sources</span>
        <span class="px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-200 text-xs text-emerald-700">✓ Complete: ${fullDone}</span>
        <span class="px-3 py-1.5 rounded-full bg-amber-50 border border-amber-200 text-xs text-amber-700">⟳ In Progress: ${fullProg}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="px-3 py-1.5 rounded-full bg-gray-100 border border-gray-200 text-xs text-gray-700">Partial Pipeline: ${withoutRules.length} sources</span>
        <span class="px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-200 text-xs text-emerald-700">✓ Complete: ${partialDone}</span>
        <span class="px-3 py-1.5 rounded-full bg-amber-50 border border-amber-200 text-xs text-amber-700">⟳ In Progress: ${partialProg}</span>
      </div>`

    const STAGE_ICONS = ['📥','📄','⚙️','🏷️','🔍','🔔']
    const STAGE_LABELS = ['Data Received','Parser File','Parser Active','Source Labeled','Detection Rules','Rules Firing']

    function renderRow(s, i) {
      const stageDots = s.stages.map((st, si) => {
        if (st.na) return `<span class="cursor-default text-base text-gray-300" title="${esc(st.stage)} — N/A (no detection rules mapped)">—</span>`
        return `<span class="cursor-default text-base ${st.done ? 'text-emerald-400' : 'text-gray-400'}" title="${esc(st.stage)}">${STAGE_ICONS[si] || '●'}</span>`
      }).join('')
      const pct = s.pct
      const barColor = pct === 100 ? 'bg-emerald-500' : pct >= 50 ? 'bg-amber-500' : 'bg-red-500'
      return `<tr class="${i % 2 === 1 ? 'bg-gray-50/50' : ''} border-b border-gray-100 hover:bg-gray-50 transition-colors">
        <td class="py-2.5 px-4 font-mono text-xs text-gray-900 max-w-xs truncate" title="${esc(s.source)}">${esc(s.source)}</td>
        <td class="py-2.5 px-4">
          <div class="flex items-center gap-1.5">${stageDots}</div>
          <div class="h-1 mt-1.5 bg-gray-200 rounded-full overflow-hidden w-24">
            <div class="h-full ${barColor} rounded-full" style="width:${pct}%"></div>
          </div>
        </td>
        <td class="py-2.5 px-4 text-xs text-gray-500 tabular-nums">${s.completed}/${s.total}</td>
        <td class="py-2.5 px-4 text-xs text-gray-500 tabular-nums">${(s.event_count||0).toLocaleString()}</td>
      </tr>`
    }

    function renderSection(title, desc, sectionSources, idPrefix) {
      if (sectionSources.length === 0) return ''
      const incomplete = sectionSources.filter(s => s.completed < s.total)
      const complete   = sectionSources.filter(s => s.completed === s.total)
      const toggleBtn  = complete.length > 0
        ? `<tr id="${idPrefix}-toggle-row" class="border-b border-gray-100">
            <td colspan="4" class="py-2 px-4">
              <button onclick="obToggleSection('${idPrefix}')" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
                <span id="${idPrefix}-toggle-label">Show completed (${complete.length})</span>
              </button>
            </td>
          </tr>` : ''
      const completeSection = `<tbody id="${idPrefix}-complete-rows" class="hidden">${complete.map((s,i)=>renderRow(s,i)).join('')}</tbody>`
      return `
        <div class="mb-5">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs font-semibold text-gray-700 uppercase tracking-wide">${esc(title)}</span>
            <span class="text-xs text-gray-400">${esc(desc)}</span>
          </div>
          <div class="overflow-x-auto rounded-xl border border-gray-200">
            <table class="w-full text-sm">
              <thead><tr class="text-left text-gray-500 bg-gray-50 border-b border-gray-200">
                <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Source</th>
                <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Pipeline Stages</th>
                <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Progress</th>
                <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Events</th>
              </tr></thead>
              <tbody>${incomplete.map((s,i)=>renderRow(s,i)).join('')}</tbody>
              ${toggleBtn}
              ${completeSection}
            </table>
          </div>
        </div>`
    }

    tableEl.innerHTML = `
      <div class="text-xs text-gray-400 mb-3 flex flex-wrap gap-3">
        ${STAGE_ICONS.map((icon,i) => `<span>${icon} ${STAGE_LABELS[i]}</span>`).join('')}
      </div>
      ${renderSection('Full Pipeline', `${withRules.length} sources — detection rules mapped (all 6 stages)`, withRules, 'ob-with')}
      ${renderSection('Partial Pipeline', `${withoutRules.length} sources — no detection rules mapped (stages 5–6 N/A)`, withoutRules, 'ob-without')}
      ${sources.length === 0 ? '<p class="text-gray-400 text-sm text-center py-4">No active sources found — sync sources on the Coverage Map first.</p>' : ''}`
  } catch(e) {
    if (tableEl) tableEl.innerHTML = `<p class="text-red-400 text-sm">${esc(e.message)}</p>`
  }
}

let _obPipelineVisible = false

function obTogglePipeline() {
  _obPipelineVisible = !_obPipelineVisible
  const tableEl = document.getElementById('ob-pipeline-table')
  const btn = document.getElementById('btn-ob-pipeline-toggle')
  if (tableEl) tableEl.classList.toggle('hidden', !_obPipelineVisible)
  if (btn) btn.textContent = _obPipelineVisible ? 'Hide Pipeline' : 'Show Pipeline'
}

function obToggleSection(idPrefix) {
  const rows  = document.getElementById(`${idPrefix}-complete-rows`)
  const label = document.getElementById(`${idPrefix}-toggle-label`)
  if (!rows) return
  const hidden = rows.classList.toggle('hidden')
  if (label) {
    const count = rows.querySelectorAll('tr').length
    label.textContent = (hidden ? 'Show' : 'Hide') + ` completed (${count})`
  }
}

async function saveSettings() {
  const updates = {}
  document.querySelectorAll('[data-key]').forEach(el => {
    // Always save select fields; only save text/password inputs when non-empty
    if (el.tagName === 'SELECT' || el.value.trim()) updates[el.dataset.key] = el.value.trim()
  })
  if (!Object.keys(updates).length) {
    document.getElementById('st-msg').innerHTML = '<span class="text-gray-400">Nothing to save — fill in at least one field.</span>'
    return
  }
  setBtn('st-save', true)
  try {
    const r = await apiPost('/api/settings/config', { updates })
    document.getElementById('st-msg').innerHTML =
      `<span class="text-green-400">✓ Saved ${r.saved.length} value${r.saved.length!==1?'s':''}. Restart the backend to apply: <code class="bg-gray-800 px-1 rounded text-xs">docker-compose up -d --build backend</code></span>`
    document.querySelectorAll('[data-key]').forEach(el => el.value = '')
  } catch(e) {
    document.getElementById('st-msg').innerHTML = `<span class="text-red-400">${esc(e.message)}</span>`
  } finally { setBtn('st-save', false, 'Save to .env') }

let _qsEvents = []   // last sampled events, keyed by index

async function qsSample() {
  const source = document.getElementById('qs-source').value
  if (!source) { document.getElementById('qs-result').innerHTML = errBox('Select a source.'); return }
  setBtn('btn-qs', true)
  document.getElementById('qs-result').innerHTML = '<p class="text-gray-500 text-sm animate-pulse">Querying data lake…</p>'
  try {
    const r = await apiPost('/api/quality/sample-events', {
      source,
      limit: +document.getElementById('qs-limit').value,
      hours: +document.getElementById('qs-hours').value,
    })
    if (!r.events?.length) {
      document.getElementById('qs-result').innerHTML = '<p class="text-gray-500 text-sm">No events found for this source in the selected window.</p>'
      return
    }
    _qsEvents = r.events
    // Build a raw-log string for each event:
    // If 'message' exists use it (or unmapped.message / unmapped.message_ fallbacks);
    // otherwise reconstruct JSON from all fields.
    const _rawMsgKeys = ['message', 'unmapped.message', 'unmapped.message_']
    const getRaw = ev => {
      for (const k of _rawMsgKeys) {
        const v = ev[k]
        if (v != null && v !== '' && v !== 'null') return v
      }
      const rest = Object.fromEntries(Object.entries(ev).filter(([k]) => !_rawMsgKeys.includes(k)))
      return JSON.stringify(rest)
    }
    // Other fields (everything except message variants) for the detail columns
    const otherFields = [...new Set(r.events.flatMap(e => Object.keys(e)))]
      .filter(f => !_rawMsgKeys.includes(f)).sort()
    const hasParsedFields = otherFields.length > 0
    const rows = r.events.map((ev, ri) => {
      const raw = getRaw(ev)
      const msgCell = `<td class="py-2 px-2 w-full">
        <div class="flex items-start gap-2">
          <button onclick="qsCopyMsg(this, ${ri})" data-msg="${esc(raw).replace(/"/g, '&quot;')}"
            class="shrink-0 mt-0.5 px-1.5 py-0.5 rounded-md text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors text-xs leading-none"
            title="Copy raw log">⎘</button>
          <span class="font-mono text-xs text-gray-700 break-all" title="${esc(raw)}">${esc(raw.slice(0, 200))}${raw.length > 200 ? '<span class="text-gray-400">…</span>' : ''}</span>
        </div>
      </td>`
      return `<tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">${msgCell}</tr>`
    }).join('')
    // Parsed-fields summary (collapsible pill list, not a wide table)
    const fieldPills = hasParsedFields
      ? `<details class="mt-3">
           <summary class="text-xs text-gray-500 cursor-pointer hover:text-gray-700">${otherFields.length} parsed fields available in sample ▸</summary>
           <div class="flex flex-wrap gap-1 mt-2">${otherFields.map(f =>
             `<span class="px-1.5 py-0.5 rounded-md bg-gray-100 border border-gray-200 text-gray-500 text-xs font-mono">${esc(f)}</span>`
           ).join('')}</div>
         </details>` : ''
    document.getElementById('qs-result').innerHTML = `
      <div class="flex items-center justify-between mb-2">
        <p class="text-xs text-gray-500">${r.count} events · ${r.hours}h window</p>
        <button onclick="qsCopyAll(this)" class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded-lg text-gray-600 flex items-center gap-1 transition-colors">⎘ Copy All</button>
      </div>
      <div class="max-h-72 overflow-y-auto rounded-xl border border-gray-200">
        <table class="text-xs w-full">
          <thead class="sticky top-0 bg-gray-50 text-gray-500 border-b border-gray-200">
            <tr><th class="pb-2 px-2 pt-2 text-left font-medium text-xs uppercase tracking-wide">Raw Log</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${fieldPills}`
  } catch(e) {
    document.getElementById('qs-result').innerHTML = errBox(e.message)
  } finally { setBtn('btn-qs', false, 'Sample') }
}

function qsCopyMsg(btn, idx) {
  const msg = btn.dataset.msg
  navigator.clipboard.writeText(msg).then(() => {
    const orig = btn.textContent
    btn.textContent = '✓'
    btn.classList.add('text-emerald-400')
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('text-emerald-400') }, 1500)
  })
}

function qsCopyAll(btn) {
  const _rawMsgKeys = ['message', 'unmapped.message', 'unmapped.message_']
  const msgs = _qsEvents
    .map(ev => {
      for (const k of _rawMsgKeys) {
        const v = ev[k]
        if (v != null && v !== '' && v !== 'null') return v
      }
      const rest = Object.fromEntries(Object.entries(ev).filter(([k]) => !_rawMsgKeys.includes(k)))
      return JSON.stringify(rest)
    })
    .filter(Boolean)
    .join('\n')
  navigator.clipboard.writeText(msgs).then(() => {
    const orig = btn.innerHTML
    btn.innerHTML = '✓ Copied!'
    btn.classList.add('text-emerald-400')
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('text-emerald-400') }, 1500)
  })
}

const QP_SDL_DEFAULTS = [
  'src.ip','dst.ip','src.port','dst.port','user.name',
  'event.type','src.process.name','src.process.cmdline',
  'tgt.file.path','network.direction'
]

async function qpDiscoverFields() {
  const source = document.getElementById('qp-source').value
  if (!source) return
  const hours = +document.getElementById('qp-hours').value || 24
  const fieldsEl = document.getElementById('qp-fields')
  fieldsEl.placeholder = 'Discovering fields…'
  fieldsEl.value = ''
  try {
    const r = await apiPost('/api/quality/sample-events', { source, limit: 20, hours })
    const seen = [...new Set(r.events.flatMap(e => Object.keys(e)))]
      .filter(f => f !== 'timestamp')
      .sort()
    // Merge log fields with SDL defaults, log fields first
    const merged = [...new Set([...seen, ...QP_SDL_DEFAULTS])]
    fieldsEl.value = merged.join(', ')
  } catch {
    fieldsEl.value = QP_SDL_DEFAULTS.join(', ')
  }
  fieldsEl.placeholder = ''
}

async function qpAnalyze() {
  const source = document.getElementById('qp-source').value
  if (!source) { document.getElementById('qp-result').innerHTML = errBox('Select a source.'); return }
  setBtn('btn-qp', true)
  document.getElementById('qp-result').innerHTML = '<p class="text-gray-500 text-sm animate-pulse">Sampling events…</p>'
  try {
    const fieldsRaw = document.getElementById('qp-fields').value
    const fields = fieldsRaw.split(',').map(f => f.trim()).filter(Boolean)
    const r = await apiPost('/api/quality/field-population', {
      source, hours: +document.getElementById('qp-hours').value, fields
    })
    if (r.total_sampled === 0) {
      document.getElementById('qp-result').innerHTML = `<p class="text-gray-500 text-sm">${esc(r.message || 'No events found in the selected window.')}</p>`
      return
    }
    const rows = r.fields.map(f => {
      const pct = f.rate
      const color = pct >= 80 ? 'bg-emerald-500' : pct >= 40 ? 'bg-amber-500' : 'bg-red-500'
      const textColor = pct >= 80 ? 'text-emerald-400' : pct >= 40 ? 'text-amber-400' : 'text-red-400'
      return `<tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
        <td class="py-2.5 pr-4 font-mono text-xs text-gray-900">${esc(f.field)}</td>
        <td class="py-2.5 pr-4 text-xs ${textColor} font-semibold w-16 tabular-nums">${pct}%</td>
        <td class="py-2.5 pr-4 w-48">
          <div class="h-1.5 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full ${color} rounded-full transition-all" style="width:${pct}%"></div>
          </div>
        </td>
        <td class="py-2.5 text-xs text-gray-400 tabular-nums">${f.populated.toLocaleString()} / ${f.total.toLocaleString()}</td>
      </tr>`
    }).join('')
    document.getElementById('qp-result').innerHTML = `
      <p class="text-xs text-gray-500 mb-3">${r.total_sampled} events sampled · ${r.hours}h window — sorted by best coverage first</p>
      <table class="w-full mb-4">
        <thead><tr class="text-left text-gray-500 border-b border-gray-100">
          <th class="pb-2 pr-4 text-xs font-medium uppercase tracking-wide">Field</th>
          <th class="pb-2 pr-4 text-xs font-medium uppercase tracking-wide">Rate</th>
          <th class="pb-2 pr-4 text-xs font-medium uppercase tracking-wide">Coverage</th>
          <th class="pb-2 text-xs font-medium uppercase tracking-wide">Events</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${r.fields_seen_in_sample?.length ? `
        <div class="border-t border-gray-100 pt-3">
          <p class="text-xs text-gray-500 mb-1">Fields actually present in sample <span class="text-gray-400">(${r.fields_seen_in_sample.length} total)</span></p>
          <div class="flex flex-wrap gap-1">${r.fields_seen_in_sample.map(f =>
            `<span class="px-2 py-0.5 bg-gray-100 border border-gray-200 rounded-lg text-xs font-mono text-gray-500">${esc(f)}</span>`).join('')}
          </div>
        </div>` : ''}`
  } catch(e) {
    document.getElementById('qp-result').innerHTML = errBox(e.message)
  } finally { setBtn('btn-qp', false, 'Analyze') }
}

async function qtLoadParsers() {
  try {
    const r = await apiGet('/api/coverage/map')
    const sources = (r.sources || []).sort((a, b) => b.event_count - a.event_count)
    const parserNames = [...new Set(sources.map(s => s.parser).filter(p => p && p !== 'detected in data'))].sort()

    // Populate source dropdowns — exclude internal S1 sources not relevant for parser quality
    const sourcePlaceholder = '<option value="">— select a source —</option>'
    const sourceOptions = sources
      .filter(s => !(EXCLUDED_SOURCES.has(s.source_name) && !s.unlabelled))
      .map(s =>
        `<option value="${esc(s.source_name)}">${esc(s.source_name)} (${(s.event_count||0).toLocaleString()} events)</option>`
      ).join('')

    const qsSel = document.getElementById('qs-source')
    const qpSel = document.getElementById('qp-source')
    if (qsSel) qsSel.innerHTML = sourcePlaceholder + sourceOptions
    if (qpSel) qpSel.innerHTML = sourcePlaceholder + sourceOptions

    // Populate parser dropdown from /app/parsers/ directory (not from coverage map)
    const qtSel = document.getElementById('qt-parser')
    if (qtSel) {
      try {
        const p = await apiGet('/api/quality/parsers')
        qtSel.innerHTML = '<option value="">— select parser —</option>'
        ;(p.parsers || []).forEach(n => {
          const o = document.createElement('option'); o.value = n; o.textContent = n; qtSel.appendChild(o)
        })
        if (!p.parsers || p.parsers.length === 0) {
          qtSel.innerHTML = '<option value="">— no parser files in /app/parsers — use "Sync SDL Parsers" on the Coverage tab or upload manually —</option>'
        }
      } catch (err) {
        qtSel.innerHTML = '<option value="">— could not load parsers: ' + esc(err.message || err) + ' —</option>'
      }
    }
  } catch(e) {
    // If no sources synced yet, fall back to empty state with hint
    const hint = '<option value="">— sync sources on Coverage Map first —</option>'
    const qsSel = document.getElementById('qs-source')
    const qpSel = document.getElementById('qp-source')
    if (qsSel) qsSel.innerHTML = hint
    if (qpSel) qpSel.innerHTML = hint
  }
}

async function qtTest() {
  const parser = document.getElementById('qt-parser').value
  const log = document.getElementById('qt-log').value.trim()
  if (!parser) { document.getElementById('qt-result').innerHTML = errBox('Select a parser.'); return }
  if (!log) { document.getElementById('qt-result').innerHTML = errBox('Paste a log line.'); return }
  setBtn('btn-qt', true)
  document.getElementById('qt-result').innerHTML = '<p class="text-gray-500 text-sm animate-pulse">Testing…</p>'
  try {
    const r = await apiPost('/api/quality/test-parser', { parser_name: parser, log_line: log })
    if (!r.matched) {
      document.getElementById('qt-result').innerHTML = `
        <div class="p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-700">
          ⚠ ${esc(r.message || 'No format pattern matched this log line.')}
          <p class="text-xs text-amber-600 mt-1">The parser's format strings didn't produce a match. Check that the log sample matches the expected format, or that the parser uses grok/dottedJson which aren't tested here.</p>
        </div>`
      return
    }
    const extracts = (r.fields || []).filter(f => f.source !== 'rewrite')
    const rewrites = (r.fields || []).filter(f => f.source === 'rewrite')
    const rowsExtract = extracts.map((f, i) => `<tr class="${i % 2 === 1 ? 'bg-gray-50/50' : ''} border-b border-gray-100 hover:bg-gray-50 transition-colors">
      <td class="py-1.5 pr-4 font-mono text-xs text-purple-600">${esc(f.field)}</td>
      <td class="py-1.5 font-mono text-xs text-gray-700">${esc(String(f.value))}</td>
    </tr>`).join('')
    const rowsRewrite = rewrites.map((f, i) => `<tr class="${i % 2 === 1 ? 'bg-gray-50/50' : ''} border-b border-gray-100 hover:bg-gray-50 transition-colors">
      <td class="py-1.5 pr-4 font-mono text-xs text-emerald-600">${esc(f.field)}</td>
      <td class="py-1.5 font-mono text-xs text-gray-700">${esc(String(f.value))}</td>
    </tr>`).join('')
    const modeBadge = r.mode === 'json'
      ? '<span class="px-2 py-0.5 ml-2 text-xs rounded bg-purple-100 border border-purple-300 text-purple-700">JSON auto-extract</span>'
      : '<span class="px-2 py-0.5 ml-2 text-xs rounded bg-blue-100 border border-blue-300 text-blue-700">regex format</span>'
    const counts = r.mode === 'json'
      ? `<span class="text-gray-500">${r.extracted_count} extracted · ${r.derived_count} rewritten` +
        (r.payload_count > 1 ? ` · showing payload ${r.showing_payload}/${r.payload_count}` : '') +
        `</span>` : ''
    const parseWarn = (r.parse_errors && r.parse_errors.length)
      ? `<div class="mt-2 p-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-700">
           ${r.parse_errors.length} line(s) skipped: ${r.parse_errors.slice(0,3).map(esc).join(' | ')}${r.parse_errors.length>3?' …':''}
         </div>` : ''
    document.getElementById('qt-result').innerHTML = `
      <div class="mb-3 p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs text-gray-500 font-mono break-all">
        <span class="text-gray-400">Matched format: </span>${esc(r.format_matched)} ${modeBadge}
        <div class="mt-1">${counts}</div>
        ${parseWarn}
      </div>
      <table class="w-full mb-4">
        <thead><tr class="text-left text-gray-500 border-b border-gray-100">
          <th class="pb-2 pr-4 text-xs font-medium uppercase tracking-wide">Extracted Field</th>
          <th class="pb-2 text-xs font-medium uppercase tracking-wide">Value</th>
        </tr></thead>
        <tbody>${rowsExtract}</tbody>
      </table>
      ${rewrites.length ? `
      <h4 class="text-xs font-semibold text-emerald-600 mb-2">Derived (rewrites applied — ${rewrites.length})</h4>
      <table class="w-full">
        <thead><tr class="text-left text-gray-500 border-b border-gray-100">
          <th class="pb-2 pr-4 text-xs font-medium uppercase tracking-wide">Output Field</th>
          <th class="pb-2 text-xs font-medium uppercase tracking-wide">Value</th>
        </tr></thead>
        <tbody>${rowsRewrite}</tbody>
      </table>` : ''}`
  } catch(e) {
    document.getElementById('qt-result').innerHTML = errBox(e.message)
  } finally { setBtn('btn-qt', false, 'Test') }
}

  // Active time-range: default 24h
  window._pqRangeUnit = 'hours'
  window._pqRangeVal = 24

  _pqRenderHistory()

  // Load presets
  try {
    const p = await apiGet('/api/query/presets')
    const presetsEl = document.getElementById('pq-presets')
    if (presetsEl && p.presets?.length) {

function pqHighlightRange() {
  document.querySelectorAll('[id^="pq-range-"]').forEach(b => {
    const id = b.id.replace('pq-range-', '')
    const [unit, val] = id.split('-')
    const active = unit === window._pqRangeUnit && +val === window._pqRangeVal
    b.className = `px-3 py-1.5 text-xs rounded-lg border transition-colors ${active ? 'bg-purple-600 border-purple-600 text-white shadow-sm' : 'border-gray-200 text-gray-500 hover:border-gray-300 hover:text-gray-700'}`
  })
}

function pqSetRange(unit, val) {
  window._pqRangeUnit = unit
  window._pqRangeVal = val
  pqHighlightRange()
}

function pqUsePreset(idx) {
  const preset = (window._pqPresets || [])[idx]
  if (!preset) return
  const ta = document.getElementById('pq-query')
  if (ta) ta.value = preset.query
}

async function pqRun() {
  const query = document.getElementById('pq-query')?.value?.trim()
  if (!query) return
  setBtn('btn-pq-run', true, 'Running…')
  document.getElementById('pq-results').innerHTML = '<p class="text-gray-500 text-sm animate-pulse">Querying data lake…</p>'
  document.getElementById('btn-pq-csv')?.classList.add('hidden')
  document.getElementById('pq-row-info').textContent = ''

  try {
    const body = {
      query,
      max_count: Math.min(+(document.getElementById('pq-max')?.value || 1000), 10000),
    }
    if (window._pqRangeUnit === 'hours') body.hours = window._pqRangeVal
    else body.days = window._pqRangeVal

    const r = await apiPost('/api/query/run', body)
    _pqResults = r.events || []
    _pqSaveHistory(query)
    _pqRenderHistory()

    const rowInfoEl = document.getElementById('pq-row-info')
    if (rowInfoEl) rowInfoEl.textContent = `${r.rows} row${r.rows !== 1 ? 's' : ''} · ${r.from?.slice(0,10)} → ${r.to?.slice(0,10)}`

    if (!_pqResults.length) {
      document.getElementById('pq-results').innerHTML = '<p class="text-gray-500 text-sm">No results returned.</p>'
      return
    }

    const cols = r.columns || []
    const MAX_ROWS = 500
    const displayRows = _pqResults.slice(0, MAX_ROWS)

    const headers = cols.map(c => `<th class="py-2 px-3 font-medium text-xs uppercase tracking-wide text-left whitespace-nowrap">${esc(c)}</th>`).join('')
    const rows = displayRows.map((ev, i) =>
      `<tr class="${i % 2 === 1 ? 'bg-gray-50/50' : ''} border-b border-gray-100 hover:bg-gray-50 transition-colors">
        ${cols.map(c => `<td class="py-2 px-3 text-xs text-gray-700 font-mono max-w-xs truncate" title="${esc(String(ev[c] ?? ''))}">${esc(String(ev[c] ?? ''))}</td>`).join('')}
      </tr>`
    ).join('')

    document.getElementById('pq-results').innerHTML = `
      <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
        ${_pqResults.length > MAX_ROWS ? `<div class="px-4 py-2 bg-amber-50 border-b border-amber-200 text-xs text-amber-700">Showing first ${MAX_ROWS} of ${_pqResults.length} rows</div>` : ''}
        <div class="overflow-x-auto max-h-[480px] overflow-y-auto">
          <table class="w-full text-sm">
            <thead class="sticky top-0 bg-gray-50 border-b border-gray-200 text-gray-500">
              <tr>${headers}</tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`

    document.getElementById('btn-pq-csv')?.classList.remove('hidden')
  } catch(e) {
    document.getElementById('pq-results').innerHTML = `<div class="p-3 bg-red-50 ring-1 ring-red-200 rounded-xl text-sm text-red-700">${esc(e.message)}</div>`
  } finally {
    setBtn('btn-pq-run', false, 'Run Query')
  }
}

function pqExportCSV() {
  if (!_pqResults.length) return
  const cols = Object.keys(_pqResults[0])
  const header = cols.map(c => JSON.stringify(c)).join(',')
  const rows = _pqResults.map(row => cols.map(c => JSON.stringify(row[c] ?? '')).join(',')).join('\n')
  const csv = header + '\n' + rows
  const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }))
  const a = document.createElement('a')
  a.href = url; a.download = 'pq_results.csv'; a.click()
  URL.revokeObjectURL(url)
}

async function loadMitre() {
  const gridEl = document.getElementById('mitre-grid')
  const statsEl = document.getElementById('mitre-stats')
  if (!gridEl) return
  gridEl.innerHTML = '<div class="col-span-full text-gray-400 text-sm text-center py-8 animate-pulse">Loading MITRE coverage…</div>'
  try {
    const data = await apiGet('/api/coverage/mitre')

    // Stats row
    if (statsEl) {
      statsEl.innerHTML = `
        ${statCard('Total Library Rules', data.total_rules, 'text-gray-900')}
        ${statCard('Rules with MITRE Mapping', data.rules_with_mitre, 'text-purple-400')}
        ${statCard('Tactics Covered', data.tactic_count, 'text-blue-400')}
        ${statCard('Techniques Covered', data.total_techniques, 'text-emerald-400')}`
    }

    if (!data.tactics || data.tactics.length === 0) {
      gridEl.innerHTML = `<div class="col-span-full bg-white border border-gray-200 rounded-xl p-8 text-center text-gray-500 text-sm">
        No MITRE data found. Sync the Detection Library to populate MITRE mappings.

      return

    gridEl.innerHTML = data.tactics.map(t => {
      const borderColor = t.rule_count >= 20 ? 'border-l-purple-500' : t.rule_count >= 5 ? 'border-l-blue-500' : 'border-l-gray-300'
      const badgeColor  = t.rule_count >= 20 ? 'bg-purple-100 text-purple-700 border-purple-300' : t.rule_count >= 5 ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-gray-100 text-gray-500 border-gray-300'

      const bodyId  = 'mitre-body-'   + t.tactic.replace(/[^a-z0-9]/gi, '_')
      const chevId  = 'mitre-chev-'   + t.tactic.replace(/[^a-z0-9]/gi, '_')

      const MAX_SHOWN = 12
      const chips = t.techniques.slice(0, MAX_SHOWN).map(tech =>
        `<span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs bg-gray-100 border border-gray-200 text-gray-500 font-mono" title="${esc(tech.name)}">${esc(tech.id || tech.name)}</span>`

      const techCount = t.techniques.length
      const bodyContent = techCount > 0
        ? `<div class="flex flex-wrap gap-1">${chips}</div>${moreSection}`
        : `<p class="text-xs text-gray-400">No technique IDs mapped</p>`

      return `<div class="bg-white border border-gray-200 rounded-xl border-l-4 ${borderColor} shadow-sm overflow-hidden">
        <button onclick="mitreToggleTactic('${bodyId}','${chevId}')" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors text-left">

function toggleDetections(uid) {
  const body = document.getElementById(uid)
  const chev = document.getElementById(uid + '-chev')
  if (!body) return
  const open = body.classList.toggle('hidden')
  if (chev) chev.style.transform = open ? '' : 'rotate(180deg)'
}

function mitreToggleTactic(bodyId, chevId) {
  const body = document.getElementById(bodyId)
  const chev  = document.getElementById(chevId)
  if (!body) return
  const hidden = body.classList.toggle('hidden')
  if (chev) chev.style.transform = hidden ? '' : 'rotate(180deg)'
}

function mitreToggleMore(id, btn) {
  const el = document.getElementById(id)
  if (!el) return
  const hidden = el.classList.toggle('hidden')
  btn.textContent = hidden ? '+' + btn.textContent.replace(/^[^ ]+\s*/, '') + ' more' : 'Show less'
  // Re-calculate count when hiding
  if (hidden) {
    const count = el.querySelectorAll('span').length
    btn.textContent = '+' + count + ' more'
  }
}

function depMapRender() {
  const tableEl = document.getElementById('depmap-table')
  if (!tableEl || !_depMapData) return
  const atRiskOnly = document.getElementById('depmap-at-risk-only')?.checked ?? false

  let rules = _depMapData.rules || []
  if (atRiskOnly) rules = rules.filter(r => r.at_risk)
  const display = atRiskOnly ? rules : rules.filter(r => !r.no_sources).concat(rules.filter(r => r.no_sources))

  if (!display.length) {
    tableEl.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">No rules match the current filter.</p>'
    return
  }

  const SOURCE_STATUS_STYLE = {
    healthy:  'bg-emerald-50 text-emerald-700 border-emerald-300',
    inactive: 'bg-red-50 text-red-700 border-red-300',
    no_parser:'bg-amber-50 text-amber-700 border-amber-300',
  }

  // Shared column widths — must match outer table colgroup
  const COL_GROUP = `<colgroup><col style="width:45%"><col style="width:30%"><col style="width:15%"><col style="width:10%"></colgroup>`

  // Build rule rows for a list of rules
  function ruleRows(ruleList) {
    return ruleList.map((r, i) => {
      const statusBadge = r.at_risk
        ? `<span class="px-2 py-0.5 rounded-full text-xs font-medium border bg-red-50 text-red-700 border-red-300">⚠ At Risk</span>`
        : `<span class="px-2 py-0.5 rounded-full text-xs font-medium border bg-emerald-50 text-emerald-700 border-emerald-300">✓ Covered</span>`
      const sourceBadges = r.no_sources
        ? `<span class="text-xs text-gray-400">—</span>`
        : r.sources.map(s =>
            `<span class="px-1.5 py-0.5 rounded border text-xs font-mono ${SOURCE_STATUS_STYLE[s.status] || ''}" title="${s.status}">${esc(s.source)}</span>`
          ).join(' ')
      const alerts = r.generated_alerts != null
        ? `<span class="text-xs tabular-nums ${r.generated_alerts > 0 ? 'text-emerald-400' : 'text-gray-400'}">${r.generated_alerts.toLocaleString()}</span>`
        : `<span class="text-xs text-gray-400">—</span>`
      return `<tr class="${i % 2 === 1 ? 'bg-gray-50/50' : ''} border-b border-gray-100 hover:bg-gray-50 transition-colors">
        <td class="py-2.5 pl-12 pr-4 text-xs text-gray-900 font-medium">${esc(r.rule)}</td>
        <td class="py-2.5 px-4 text-xs"><div class="flex flex-wrap gap-1">${sourceBadges}</div></td>
        <td class="py-2.5 px-4 text-center">${statusBadge}</td>
        <td class="py-2.5 px-4 text-right text-xs tabular-nums">${alerts}</td>
      </tr>`
    }).join('')
  }

  // Build product sub-group rows within a category
  function productSections(ruleList, prefix) {
    const byProduct = {}
    for (const r of ruleList) {
      const prod = r.product || 'SentinelOne'
      if (!byProduct[prod]) byProduct[prod] = []
      byProduct[prod].push(r)
    }
    return Object.keys(byProduct).sort((a, b) => a.localeCompare(b)).map(product => {
      const prodRules = byProduct[product]
      const uid = prefix + '_' + product.replace(/[^a-z0-9]/gi, '_')
      const atRiskCount = prodRules.filter(r => r.at_risk).length
      const countBadge = atRiskCount > 0
        ? `<span class="ml-2 px-2 py-0.5 rounded-full text-xs font-medium border bg-red-50 text-red-700 border-red-300">⚠ ${atRiskCount} at risk</span>`
        : `<span class="ml-2 text-xs text-gray-500">${prodRules.length} rule${prodRules.length !== 1 ? 's' : ''}</span>`
      return `
        <tr class="bg-gray-50 hover:bg-gray-100 border-b border-gray-100 cursor-pointer select-none transition-colors"
            onclick="toggleDepMapProduct('${uid}')">
          <td colspan="4" class="py-2 pl-8 pr-4">
            <div class="flex items-center gap-2">
              <svg id="${uid}-chev" class="w-3 h-3 text-gray-400 transition-transform shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
              <span class="text-xs font-medium text-gray-700 uppercase tracking-wide">${esc(product)}</span>
              ${countBadge}
            </div>
          </td>
        </tr>
        <tr id="${uid}" class="hidden"><td colspan="4" class="p-0">
          <table class="w-full text-sm">${COL_GROUP}<tbody>${ruleRows(prodRules)}</tbody></table>
        </td></tr>`
    }).join('')
  }

  // Split into At Risk / Covered outer categories
  const atRiskRules  = display.filter(r => r.at_risk)
  const coveredRules = display.filter(r => !r.at_risk)

  function categorySection(label, categoryRules, uid, isRisk) {
    if (!categoryRules.length) return ''
    const startOpen = isRisk  // At Risk expanded by default, Covered collapsed
    const headerBg = isRisk ? 'bg-red-50 hover:bg-red-100' : 'bg-emerald-50 hover:bg-emerald-100'
    const chevColor = isRisk ? 'text-red-500' : 'text-emerald-500'
    const labelColor = isRisk ? 'text-red-700' : 'text-emerald-700'
    const countColor = isRisk ? 'text-red-600' : 'text-emerald-600'
    return `
      <tr class="${headerBg} border-b border-gray-200 cursor-pointer select-none transition-colors"
          onclick="toggleDepMapProduct('${uid}')">
        <td colspan="4" class="py-3 px-4">
          <div class="flex items-center gap-2">
            <svg id="${uid}-chev" class="w-4 h-4 ${chevColor} transition-transform shrink-0" style="${startOpen ? 'transform:rotate(180deg)' : ''}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
            <span class="text-sm font-bold ${labelColor} uppercase tracking-wider">${label}</span>
            <span class="text-sm font-bold ${countColor}">${categoryRules.length}</span>
            <span class="text-xs text-gray-500">rule${categoryRules.length !== 1 ? 's' : ''}</span>
          </div>
        </td>
      </tr>
      <tr id="${uid}" class="${startOpen ? '' : 'hidden'}"><td colspan="4" class="p-0">
        <table class="w-full text-sm">${COL_GROUP}<tbody>${productSections(categoryRules, uid)}</tbody></table>
      </td></tr>`
  }

  tableEl.innerHTML = `
    <div class="overflow-x-auto rounded-xl border border-gray-200">
      <table class="w-full text-sm">
        ${COL_GROUP}
        <thead><tr class="text-left text-gray-500 bg-gray-50 border-b border-gray-200">
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Rule Name</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide">Required Sources</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide text-center">Status</th>
          <th class="py-3 px-4 font-medium text-xs uppercase tracking-wide text-right">Alerts</th>
        </tr></thead>
        <tbody>
          ${categorySection('⚠ At Risk', atRiskRules,  'cat_atrisk',  true)}
          ${categorySection('✓ Covered', coveredRules, 'cat_covered', false)}
        </tbody>
      </table>
    </div>
    <p class="text-xs text-gray-400 mt-2">Source badges: <span class="text-emerald-600">green</span> = healthy · <span class="text-red-500">red</span> = inactive · <span class="text-amber-500">amber</span> = no parser</p>`
}

function toggleDepMapProduct(uid) {
  const body = document.getElementById(uid)
  const chev = document.getElementById(uid + '-chev')
  if (!body) return
  const hidden = body.classList.toggle('hidden')
  if (chev) chev.style.transform = hidden ? '' : 'rotate(180deg)'
}
